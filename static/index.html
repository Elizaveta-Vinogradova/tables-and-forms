<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Форма выбора питомца</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<main>
    <h1>Найди себе друга!</h1>

    <form action="/pets/orders" method="post">
        <div>
        <label>Тип животное
            <select required name="petType">
                <option value="cat">Собака</option>
                <option value="dog">Кошка</option>
                <option value="tiger">Тигр</option>
            </select>
        </label>
        </div>
        <div>
            <input type="radio" name="gender" value="boy"> Мальчик
        </div>
        <div>
            <input type="radio" name="gender" value="girl"> Девочка
        </div>
        <div>
            <input type="radio" name="gender" value="none"> Нечто
        </div>
        <div>
            <label>Цвет глаз
                <input type="color" name="eyeColor">
            </label>
        </div>
        <div>
            <label>Длина хвоста
                <input type="range" min="7" max="120" name="tailLength">
            </label>
        </div>
        <div>
            <label>Имя животного
                <input type="text" name="name">
            </label>
        </div>
        <div>
            <label>Дата рождения
                <input type=date name="dateOfBirth">
            </label>
        </div>
        <div>
            <label>Почта
                <input type="email" name="email">
            </label>
        </div>
        <div>
            <label>Телефон
                <input type="tel" name="phone">
            </label>
        </div>
        <div>
            <input type="text" name="rules">
        </div>
        <button type="submit">Отправить</button>
    </form>
</main>
</body>
</html>
